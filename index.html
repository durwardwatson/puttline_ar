<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PuttLine AR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap');
  :root {
    --green: #00c96e; --green-dim: #00c96e44; --amber: #f5a623;
    --bg: #080f0a; --panel: rgba(8,15,10,0.88); --border: rgba(0,201,110,0.22);
    --text: #e8f5ed; --muted: #5a7a63;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; height:100dvh; overflow:hidden; user-select:none; -webkit-user-select:none; }
  #app { position:relative; width:100%; height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center; }

  /* SPLASH */
  #splash { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--bg); z-index:100; padding:24px; }
  .splash-logo { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:clamp(52px,14vw,96px); letter-spacing:-2px; line-height:0.9; color:var(--green); text-transform:uppercase; animation:fadeUp 0.8s ease both; text-align:center; }
  .splash-sub { font-family:'Barlow Condensed',sans-serif; font-weight:300; font-size:clamp(14px,4vw,20px); letter-spacing:8px; color:var(--muted); text-transform:uppercase; margin-top:8px; animation:fadeUp 0.8s 0.2s ease both; }
  .splash-divider { width:40px; height:2px; background:var(--green); margin:24px 0; animation:expandWidth 0.6s 0.5s ease both; }
  .splash-desc { font-size:14px; color:var(--muted); text-align:center; max-width:280px; line-height:1.6; animation:fadeUp 0.8s 0.4s ease both; }
  .key-wrap { margin-top:24px; width:min(300px,90vw); animation:fadeUp 0.8s 0.5s ease both; }
  .key-label { font-family:'Barlow Condensed',sans-serif; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:8px; }
  #apiKeyInput { width:100%; background:rgba(0,201,110,0.06); border:1px solid var(--border); color:var(--text); font-family:'Barlow',sans-serif; font-size:14px; padding:14px 16px; outline:none; box-sizing:border-box; -webkit-appearance:none; border-radius:0; }
  #apiKeyInput:focus { border-color:rgba(0,201,110,0.6); }
  .key-hint { font-size:11px; color:var(--muted); margin-top:8px; line-height:1.6; }
  .key-hint a { color:var(--green); text-decoration:none; }
  #startBtn { margin-top:24px; background:var(--green); color:#050d07; border:none; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:18px; letter-spacing:3px; text-transform:uppercase; padding:18px 48px; cursor:pointer; animation:fadeUp 0.8s 0.6s ease both; transition:transform 0.15s, box-shadow 0.15s, opacity 0.2s; }
  #startBtn:not(:disabled):hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,201,110,0.4); }
  #startBtn:disabled { opacity:0.35; cursor:not-allowed; }

  /* AR VIEW */
  #arView { display:none; position:absolute; inset:0; width:100%; height:100%; }
  #video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  #canvas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

  /* HUD */
  #hud { position:absolute; inset:0; pointer-events:none; display:flex; flex-direction:column; }
  .hud-top { display:flex; align-items:flex-start; justify-content:space-between; padding:52px 20px 16px; }
  .hud-logo { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:22px; letter-spacing:1px; color:var(--green); text-shadow:0 0 20px rgba(0,201,110,0.5); }
  .hud-logo span { color:var(--text); font-weight:300; }
  .status-badge { display:flex; align-items:center; gap:6px; background:var(--panel); border:1px solid var(--border); padding:6px 12px; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); backdrop-filter:blur(12px); }
  .status-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); }
  .status-dot.active { background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s infinite; }
  .status-dot.analyzing { background:var(--amber); box-shadow:0 0 8px var(--amber); animation:pulse 0.8s infinite; }
  .corner-frame { position:absolute; inset:80px 16px 160px; pointer-events:none; }
  .corner { position:absolute; width:28px; height:28px; border-color:rgba(0,201,110,0.55); border-style:solid; }
  .corner.tl { top:0; left:0; border-width:2px 0 0 2px; }
  .corner.tr { top:0; right:0; border-width:2px 2px 0 0; }
  .corner.bl { bottom:0; left:0; border-width:0 0 2px 2px; }
  .corner.br { bottom:0; right:0; border-width:0 2px 2px 0; }
  .crosshair { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:24px; height:24px; }
  .crosshair::before,.crosshair::after { content:''; position:absolute; background:rgba(0,201,110,0.6); }
  .crosshair::before { width:1px; height:100%; top:0; left:50%; transform:translateX(-50%); }
  .crosshair::after { width:100%; height:1px; top:50%; left:0; transform:translateY(-50%); }

  /* BOTTOM PANEL */
  .hud-bottom { margin-top:auto; padding:16px; display:flex; flex-direction:column; gap:10px; pointer-events:all; }
  #analysisPanel { background:var(--panel); border:1px solid var(--border); backdrop-filter:blur(16px); padding:16px 18px; display:none; flex-direction:column; gap:8px; }
  .panel-header { display:flex; align-items:center; justify-content:space-between; }
  .panel-label { font-family:'Barlow Condensed',sans-serif; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); }
  .panel-confidence { font-family:'Barlow Condensed',sans-serif; font-size:11px; letter-spacing:2px; text-transform:uppercase; }
  #analysisText { font-size:14px; line-height:1.55; color:var(--text); }
  .read-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:6px; }
  .read-cell { background:rgba(0,201,110,0.06); border:1px solid var(--border); padding:10px 8px; text-align:center; }
  .read-cell-label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:4px; }
  .read-cell-value { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:20px; color:var(--green); }
  #analyzeBtn { background:var(--green); color:#050d07; border:none; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:18px; letter-spacing:3px; text-transform:uppercase; padding:18px; cursor:pointer; transition:opacity 0.2s,transform 0.15s; width:100%; }
  #analyzeBtn:active { transform:scale(0.98); }
  #analyzeBtn:disabled { opacity:0.4; cursor:not-allowed; }
  #clearBtn { background:transparent; color:var(--muted); border:1px solid var(--border); font-family:'Barlow Condensed',sans-serif; font-size:13px; letter-spacing:2px; text-transform:uppercase; padding:10px; cursor:pointer; width:100%; transition:color 0.2s,border-color 0.2s; }
  #clearBtn:hover { color:var(--text); border-color:rgba(0,201,110,0.4); }

  /* LOADING */
  #loadingOverlay { position:absolute; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column; gap:16px; background:rgba(8,15,10,0.7); backdrop-filter:blur(2px); z-index:10; pointer-events:none; }
  #loadingOverlay.visible { display:flex; }
  .spinner { width:48px; height:48px; border:2px solid var(--green-dim); border-top-color:var(--green); border-radius:50%; animation:spin 0.9s linear infinite; }
  .loading-text { font-family:'Barlow Condensed',sans-serif; font-size:13px; letter-spacing:4px; text-transform:uppercase; color:var(--green); animation:blink 1.2s ease infinite; }

  /* TOAST */
  #toast { position:absolute; top:100px; left:50%; transform:translateX(-50%); background:rgba(255,59,59,0.15); border:1px solid rgba(255,59,59,0.4); color:#ff8080; font-size:13px; padding:12px 18px; z-index:200; display:none; max-width:320px; width:90vw; text-align:center; backdrop-filter:blur(12px); }

  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes expandWidth { from{width:0;opacity:0} to{width:40px;opacity:1} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }
</style>
</head>
<body>
<div id="app">

  <!-- SPLASH -->
  <div id="splash">
    <div class="splash-logo">Putt<br>Line</div>
    <div class="splash-sub">AR Caddie</div>
    <div class="splash-divider"></div>
    <div class="splash-desc">Point your camera at the green. AI reads the slope and draws your ideal putt line.</div>
    <div class="key-wrap">
      <span class="key-label">Anthropic API Key</span>
      <input id="apiKeyInput" type="password" placeholder="sk-ant-..." spellcheck="false" autocomplete="off" oninput="onKeyInput(this.value)" />
      <div class="key-hint">Get yours at <a href="https://console.anthropic.com/keys" target="_blank">console.anthropic.com</a>. Stays on your device only.</div>
    </div>
    <button id="startBtn" onclick="startAR()" disabled>Open Camera</button>
  </div>

  <!-- AR VIEW -->
  <div id="arView">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
    <div id="hud">
      <div class="hud-top">
        <div class="hud-logo">Putt<span>Line</span></div>
        <div class="status-badge">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText">READY</span>
        </div>
      </div>
      <div class="corner-frame">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="crosshair"></div>
      </div>
      <div class="hud-bottom">
        <div id="analysisPanel">
          <div class="panel-header">
            <span class="panel-label">Putt Read</span>
            <span class="panel-confidence" id="confidenceText"></span>
          </div>
          <div id="analysisText"></div>
          <div class="read-grid" id="readGrid"></div>
        </div>
        <button id="analyzeBtn" onclick="analyzeFrame()">Read the Green</button>
        <button id="clearBtn" onclick="clearAnalysis()" style="display:none">Clear Line</button>
      </div>
    </div>
    <div id="loadingOverlay"><div class="spinner"></div><div class="loading-text">Reading Green...</div></div>
    <div id="toast"></div>
  </div>

</div>
<script>
const API_URL = "https://api.anthropic.com/v1/messages";
const MODEL   = "claude-sonnet-4-20250514";

let apiKey = '';
let stream = null, lastAnalysis = null, animFrame = null, arrowPhase = 0;

const splash        = document.getElementById('splash');
const arView        = document.getElementById('arView');
const video         = document.getElementById('video');
const canvas        = document.getElementById('canvas');
const ctx           = canvas.getContext('2d');
const analyzeBtn    = document.getElementById('analyzeBtn');
const clearBtn      = document.getElementById('clearBtn');
const loadingOverlay= document.getElementById('loadingOverlay');
const statusDot     = document.getElementById('statusDot');
const statusText    = document.getElementById('statusText');
const analysisPanel = document.getElementById('analysisPanel');
const analysisText  = document.getElementById('analysisText');
const readGrid      = document.getElementById('readGrid');
const confidenceText= document.getElementById('confidenceText');
const toast         = document.getElementById('toast');
const startBtn      = document.getElementById('startBtn');

function onKeyInput(val) {
  apiKey = val.trim();
  const ok = apiKey.length >= 20;
  startBtn.disabled = !ok;
}

async function startAR() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    splash.style.display = 'none';
    arView.style.display = 'block';
    setStatus('LIVE', 'active');
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    renderLoop();
  } catch(e) {
    showToast('Camera access denied. Please allow camera permissions and reload.');
  }
}

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}

function renderLoop() {
  arrowPhase = (arrowPhase + 0.04) % (Math.PI * 2);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (lastAnalysis) drawAROverlay(lastAnalysis);
  animFrame = requestAnimationFrame(renderLoop);
}

function captureFrame() {
  const cap = document.createElement('canvas');
  cap.width  = video.videoWidth  || 1280;
  cap.height = video.videoHeight || 720;
  cap.getContext('2d').drawImage(video, 0, 0, cap.width, cap.height);
  return cap.toDataURL('image/jpeg', 0.82).split(',')[1];
}

async function analyzeFrame() {
  if (analyzeBtn.disabled) return;
  analyzeBtn.disabled = true;
  loadingOverlay.classList.add('visible');
  setStatus('ANALYZING', 'analyzing');
  clearAnalysis(true);

  const imageBase64 = captureFrame();
  const systemPrompt = `You are an expert golf caddie. Analyze the golf green image and respond ONLY with a valid JSON object (no markdown, no extra text):
{"breakDirection":"left|right|straight","breakAmount":"slight|moderate|strong","breakDegrees":0,"slopeSteepness":"flat|gentle|steep","slopePercent":0,"aimPoint":"left edge|right edge|center|left center|right center","speedRecommendation":"firm|medium|soft","distanceCategory":"short|medium|long","confidence":"low|medium|high","summary":"one sentence caddie advice max 18 words","linePoints":[{"x":0.0,"y":0.0}]}
linePoints: 5-6 points. x=0 left, x=1 right, y=0 top, y=1 bottom. Ball is bottom (y~0.8), hole is upper area (y~0.3). Curve based on break.`;

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: imageBase64 } },
          { type: 'text', text: 'Read this putt and return JSON.' }
        ]}]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || 'HTTP ' + response.status);
    }

    const data = await response.json();
    const raw  = data.content.map(b => b.text || '').join('').trim();
    const clean = raw.replace(/```json|```/g, '').trim();
    const analysis = JSON.parse(clean);

    lastAnalysis = analysis;
    showAnalysisPanel(analysis);
    setStatus('LINE READY', 'active');
    clearBtn.style.display = 'block';

  } catch(e) {
    console.error(e);
    showToast('Error: ' + (e.message || 'Unknown. Check console.'));
    setStatus('ERROR', '');
  } finally {
    analyzeBtn.disabled = false;
    loadingOverlay.classList.remove('visible');
  }
}

function drawAROverlay(analysis) {
  if (!analysis?.linePoints?.length) return;
  const W = canvas.width, H = canvas.height;
  const pts = analysis.linePoints.map(p => ({ x: p.x * W, y: p.y * H }));
  if (pts.length < 2) return;

  const grad = ctx.createLinearGradient(pts[pts.length-1].x, pts[pts.length-1].y, pts[0].x, pts[0].y);
  grad.addColorStop(0, 'rgba(0,201,110,0.1)');
  grad.addColorStop(0.4, 'rgba(0,201,110,0.7)');
  grad.addColorStop(1, 'rgba(245,166,35,0.9)');

  ctx.save();
  ctx.shadowColor = '#00c96e'; ctx.shadowBlur = 22;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length - 1; i++) {
    const mx = (pts[i].x + pts[i+1].x) / 2, my = (pts[i].y + pts[i+1].y) / 2;
    ctx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
  }
  ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
  ctx.strokeStyle = grad; ctx.lineWidth = 4; ctx.stroke();
  ctx.restore();

  for (let i = 0; i < 8; i++) {
    const t = ((i / 8) + arrowPhase / (Math.PI * 2)) % 1;
    const pt = getPointOnPath(pts, t), pt2 = getPointOnPath(pts, Math.min(t + 0.02, 1));
    ctx.save();
    ctx.globalAlpha = Math.sin(t * Math.PI) * 0.9;
    ctx.translate(pt.x, pt.y);
    ctx.rotate(Math.atan2(pt2.y - pt.y, pt2.x - pt.x));
    ctx.beginPath(); ctx.moveTo(10,0); ctx.lineTo(-6,-5); ctx.lineTo(-6,5); ctx.closePath();
    ctx.fillStyle = '#00c96e'; ctx.shadowColor = '#00c96e'; ctx.shadowBlur = 8; ctx.fill();
    ctx.restore();
  }

  const start = pts[0];
  ctx.save();
  ctx.beginPath(); ctx.arc(start.x, start.y, 9, 0, Math.PI*2);
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2.5;
  ctx.shadowColor = '#00c96e'; ctx.shadowBlur = 12; ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.fill();
  ctx.restore();

  const end = pts[pts.length-1];
  const pulse = 0.5 + 0.5 * Math.sin(arrowPhase * 3);
  ctx.save();
  ctx.beginPath(); ctx.arc(end.x, end.y, 16 + pulse*4, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(245,166,35,' + (0.4+pulse*0.3) + ')'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(end.x, end.y, 10, 0, Math.PI*2);
  ctx.strokeStyle = '#f5a623'; ctx.lineWidth = 2.5;
  ctx.shadowColor = '#f5a623'; ctx.shadowBlur = 14; ctx.stroke();
  ctx.fillStyle = '#f5a623'; ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('⛳', end.x, end.y);
  ctx.restore();

  if (analysis.breakDirection && analysis.breakAmount) {
    const mid = getPointOnPath(pts, 0.45);
    ctx.save();
    ctx.font = '600 12px Barlow,sans-serif'; ctx.textAlign = 'center';
    const label = (analysis.breakAmount + ' ' + analysis.breakDirection).toUpperCase();
    const tw = ctx.measureText(label).width;
    ctx.fillStyle = 'rgba(8,15,10,0.75)';
    ctx.fillRect(mid.x - tw/2 - 10, mid.y - 14, tw + 20, 22);
    ctx.fillStyle = '#00c96e'; ctx.fillText(label, mid.x, mid.y);
    ctx.restore();
  }
}

function getPointOnPath(pts, t) {
  const totalSegs = pts.length - 1;
  const seg = Math.min(Math.floor(t * totalSegs), totalSegs - 1);
  const a = pts[seg], b = pts[seg+1];
  const st = (t * totalSegs) - seg;
  return { x: a.x + (b.x - a.x) * st, y: a.y + (b.y - a.y) * st };
}

function showAnalysisPanel(a) {
  analysisPanel.style.display = 'flex';
  analysisText.textContent = a.summary || '';
  const confColor = a.confidence === 'high' ? '#00c96e' : a.confidence === 'medium' ? '#f5a623' : '#ff8080';
  confidenceText.textContent = (a.confidence || '').toUpperCase() + ' CONF';
  confidenceText.style.color = confColor;
  const cells = [
    { label:'Break', value: a.breakDirection === 'straight' ? '→' : (a.breakDirection === 'left' ? '← ' : '→ ') + (a.breakDegrees||'') + '°' },
    { label:'Slope', value: a.slopePercent != null ? a.slopePercent + '%' : '–' },
    { label:'Speed', value: (a.speedRecommendation || '–').toUpperCase() }
  ];
  readGrid.innerHTML = cells.map(c =>
    '<div class="read-cell"><span class="read-cell-label">' + c.label + '</span><span class="read-cell-value">' + c.value + '</span></div>'
  ).join('');
}

function clearAnalysis(silent) {
  lastAnalysis = null;
  analysisPanel.style.display = 'none';
  clearBtn.style.display = 'none';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!silent) setStatus('READY', 'active');
}

function setStatus(text, state) {
  statusText.textContent = text;
  statusDot.className = 'status-dot' + (state ? ' ' + state : '');
}

function showToast(msg) {
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 8000);
}
</script>
</body>
</html>
